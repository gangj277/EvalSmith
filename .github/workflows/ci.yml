name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate packaged skill and marketplace
        run: python scripts/validate_packaged_skill.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
